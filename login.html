<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="topnav">
                        <div class="logo">
                            <img src="https://companieslogo.com/img/orig/ATO.PA.D-3c97ece3.png?t=1720244490" alt="Logo">
                        </div>
</header>
    <main>
        <section class="login">
            <div class="login-block">
                <div class="login-bg"></div>
                <h1>Přihlaš se tady!</h1>
                <p>(User:admin || Heslo:1234)</p>
                <div class="username"><input type="text" id="username" placeholder="Uživatel"></div>
                <div class="password"><input type="password" id="password" placeholder="Heslo"></div>
                <div class="login-btn"><button onclick="login()">Přihlásit</button></div>
            </div>
        </section>
    </main>
</body>
</html>
